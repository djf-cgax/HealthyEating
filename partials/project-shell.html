    <style id="theme-vars">
/* ===== Brand Design Tokens — Fitness Diet Tracker ===== */

:root {
  /* ---- Primary Palette ---- */
  --color-primary: #10B981;
  --color-primary-light: #34D399;
  --color-primary-lighter: #A7F3D0;
  --color-primary-lightest: #D1FAE5;
  --color-primary-dark: #059669;
  --color-primary-darker: #047857;

  /* ---- Accent (Energy Orange) ---- */
  --color-accent: #F97316;
  --color-accent-light: #FB923C;
  --color-accent-lighter: #FDBA74;
  --color-accent-lightest: #FED7AA;
  --color-accent-dark: #EA580C;

  /* ---- Neutral Scale ---- */
  --color-neutral-50: #F9FAFB;
  --color-neutral-100: #F3F4F6;
  --color-neutral-200: #E5E7EB;
  --color-neutral-300: #D1D5DB;
  --color-neutral-400: #9CA3AF;
  --color-neutral-500: #6B7280;
  --color-neutral-600: #4B5563;
  --color-neutral-700: #374151;
  --color-neutral-800: #1F2937;
  --color-neutral-900: #111827;
  --color-neutral-950: #030712;

  /* ---- Surface ---- */
  --color-surface: #FFFFFF;
  --color-surface-secondary: #F9FAFB;
  --color-surface-tertiary: #F3F4F6;
  --color-surface-elevated: #FFFFFF;

  /* ---- State Colors ---- */
  --state-success: #10B981;
  --state-success-bg: #D1FAE5;
  --state-warning: #F59E0B;
  --state-warning-bg: #FEF3C7;
  --state-error: #EF4444;
  --state-error-bg: #FEE2E2;
  --state-info: #3B82F6;
  --state-info-bg: #DBEAFE;

  /* ---- Text ---- */
  --color-text-primary: #111827;
  --color-text-secondary: #4B5563;
  --color-text-tertiary: #9CA3AF;
  --color-text-inverse: #FFFFFF;
  --color-text-link: #10B981;

  /* ---- Typography ---- */
  --font-display: 'Outfit', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
  --font-body: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

  /* Type Scale */
  --text-xs: 0.75rem;     /* 12px */
  --text-sm: 0.875rem;    /* 14px */
  --text-base: 1rem;      /* 16px */
  --text-lg: 1.125rem;    /* 18px */
  --text-xl: 1.25rem;     /* 20px */
  --text-2xl: 1.5rem;     /* 24px */
  --text-3xl: 1.875rem;    /* 30px */
  --text-4xl: 2.25rem;    /* 36px */
  --text-5xl: 3rem;       /* 48px */

  /* Font Weights */
  --font-light: 300;
  --font-regular: 400;
  --font-medium: 500;
  --font-semibold: 600;
  --font-bold: 700;
  --font-extrabold: 800;

  /* Line Heights */
  --leading-tight: 1.25;
  --leading-snug: 1.35;
  --leading-normal: 1.5;
  --leading-relaxed: 1.65;

  /* ---- Spacing ---- */
  --space-1: 0.25rem;   /* 4px */
  --space-2: 0.5rem;     /* 8px */
  --space-3: 0.75rem;    /* 12px */
  --space-4: 1rem;       /* 16px */
  --space-5: 1.25rem;    /* 20px */
  --space-6: 1.5rem;     /* 24px */
  --space-8: 2rem;       /* 32px */
  --space-10: 2.5rem;    /* 40px */
  --space-12: 3rem;      /* 48px */
  --space-16: 4rem;      /* 64px */
  --space-20: 5rem;      /* 80px */

  /* ---- Border Radius ---- */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ---- Shadows ---- */
  --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.03);
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.04);
  --shadow-xl: 0 20px 25px rgba(0, 0, 0, 0.05);

  /* Floating layer shadows (modal, popover, dropdown) */
  --shadow-float: 0 25px 50px rgba(0, 0, 0, 0.08);

  /* ---- Transitions ---- */
  --transition-fast: 150ms ease;
  --transition-base: 250ms ease;
  --transition-slow: 350ms ease;
  --transition-bounce: 400ms cubic-bezier(0.34, 1.56, 0.64, 1);

  /* ---- Z-index ---- */
  --z-dropdown: 100;
  --z-sticky: 200;
  --z-modal-backdrop: 300;
  --z-modal: 400;
  --z-popover: 500;
  --z-toast: 600;
  --z-tooltip: 700;
}

/* ===== Tailwind Integration ===== */
@tailwind base;
@tailwind components;
@tailwind utilities;

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }

  /* ===== Shell Layout ===== */
  body {
    display: grid;
    grid-template-columns: 240px 1fr;
    grid-template-rows: 64px 1fr;
    grid-template-areas:
      "sidebar topnav"
      "sidebar main";
    min-height: 100vh;
    background: var(--color-neutral-50);
    margin: 0;
    padding: 0;
  }

  /* ===== Top Navigation Bar ===== */
  .top-nav {
    grid-area: topnav;
    position: fixed;
    top: 0;
    left: 240px;
    right: 0;
    height: 64px;
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-neutral-200);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: var(--z-sticky);
    box-shadow: var(--shadow-xs);
  }

  .top-nav__search {
    flex: 1;
    max-width: 480px;
    position: relative;
  }

  .top-nav__search input {
    width: 100%;
    height: 40px;
    padding: 0 16px 0 40px;
    border: 1px solid var(--color-neutral-200);
    border-radius: var(--radius-lg);
    background: var(--color-neutral-50);
    font-family: var(--font-body);
    font-size: var(--text-sm);
    color: var(--color-text-primary);
    transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    outline: none;
  }

  .top-nav__search input::placeholder {
    color: var(--color-text-tertiary);
  }

  .top-nav__search input:focus {
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
  }

  .top-nav__search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--color-text-tertiary);
    pointer-events: none;
  }

  .top-nav__actions {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  .top-nav__notification {
    position: relative;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-lg);
    color: var(--color-neutral-500);
    transition: background var(--transition-fast), color var(--transition-fast);
    cursor: pointer;
    background: none;
    border: none;
  }

  .top-nav__notification:hover {
    background: var(--color-neutral-100);
    color: var(--color-text-primary);
  }

  .top-nav__avatar {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-full);
    background: var(--color-primary);
    color: var(--color-text-inverse);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-body);
    font-size: var(--text-sm);
    font-weight: var(--font-semibold);
    flex-shrink: 0;
    cursor: pointer;
    transition: box-shadow var(--transition-fast);
  }

  .top-nav__avatar:hover {
    box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.25);
  }

  /* ===== Left Sidebar ===== */
  .sidebar {
    grid-area: sidebar;
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    width: 240px;
    background: var(--color-neutral-800);
    display: flex;
    flex-direction: column;
    z-index: calc(var(--z-sticky) + 1);
    overflow-y: auto;
    overflow-x: hidden;
  }

  .sidebar__logo {
    height: 64px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    flex-shrink: 0;
  }

  .sidebar__logo-icon {
    color: var(--color-primary);
    flex-shrink: 0;
  }

  .sidebar__logo-text {
    font-family: var(--font-display);
    font-size: var(--text-xl);
    font-weight: var(--font-bold);
    color: var(--color-primary-light);
    white-space: nowrap;
    letter-spacing: -0.02em;
  }

  .sidebar__nav {
    flex: 1;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .sidebar__nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    height: 44px;
    padding: 0 12px;
    border-radius: var(--radius-md);
    color: var(--color-neutral-400);
    font-family: var(--font-body);
    font-size: var(--text-sm);
    font-weight: var(--font-medium);
    text-decoration: none;
    white-space: nowrap;
    transition: background var(--transition-fast), color var(--transition-fast);
    position: relative;
    overflow: hidden;
    min-width: 0;
  }

  .sidebar__nav-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 6px;
    bottom: 6px;
    width: 3px;
    border-radius: 0 3px 3px 0;
    background: transparent;
    transition: background var(--transition-fast);
  }

  .sidebar__nav-item:hover {
    background: rgba(255, 255, 255, 0.06);
    color: var(--color-neutral-200);
  }

  .sidebar__nav-item[data-active="true"] {
    background: rgba(16, 185, 129, 0.1);
    color: var(--color-neutral-50);
  }

  .sidebar__nav-item[data-active="true"]::before {
    background: var(--color-primary);
  }

  .sidebar__nav-icon {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
  }

  .sidebar__nav-label {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ===== Main Content Area ===== */
  .main-content {
    grid-area: main;
    margin-left: 240px;
    margin-top: 64px;
    min-height: calc(100vh - 64px);
    padding: 24px;
  }

  /* ===== Responsive ===== */
  @media (max-width: 1023px) {
    body {
      grid-template-columns: 1fr;
      grid-template-rows: 64px 1fr;
      grid-template-areas:
        "topnav"
        "main";
    }

    .sidebar {
      display: none;
    }

    .top-nav {
      left: 0;
    }

    .main-content {
      margin-left: 0;
    }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">

    <!-- ===== Left Sidebar ===== -->
    <aside class="sidebar" data-dom-id="sidebar">
        <!-- Logo -->
        <div class="sidebar__logo" data-dom-id="sidebar-logo">
            <i data-lucide="leaf" class="sidebar__logo-icon" style="width:24px;height:24px;"></i>

        <nav class="sidebar__nav" data-dom-id="sidebar-nav">

            <a href="#" class="sidebar__nav-item" data-dom-id="nav-analytics" data-nav-key="analytics">

            <a href="#" class="sidebar__nav-item" data-dom-id="nav-ai-assistant" data-nav-key="ai-assistant">

            <a href="#" class="sidebar__nav-item" data-dom-id="nav-profile" data-nav-key="profile">

            </a>
        </nav>
    </aside>

    <!-- ===== Top Navigation Bar ===== -->
    <header class="top-nav" data-dom-id="top-nav">
        <!-- Search -->
        <div class="top-nav__search" data-dom-id="top-nav-search">
            <i data-lucide="search" class="top-nav__search-icon" style="width:18px;height:18px;"></i>
            <input type="text" placeholder="搜索食物、菜谱..." data-dom-id="search-input">
        </div>

        <!-- Actions -->
        <div class="top-nav__actions" data-dom-id="top-nav-actions">
            <button class="top-nav__notification" data-dom-id="notification-btn" aria-label="通知">
                <i data-lucide="bell" style="width:20px;height:20px;"></i>
            </button>
            <div class="top-nav__avatar" data-dom-id="user-avatar" title="张">
                张
            </div>
        </div>
    </header>

    <!-- ===== Main Content Slot ===== -->
    <main id="main-content" class="main-content" data-dom-id="main-content">
    <!-- SLOT: mainContent -->
    </main>

    <script>lucide.createIcons();</script>
</body>
