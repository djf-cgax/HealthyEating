    <style id="theme-vars">
/* ===== Brand Design Tokens — Fitness Diet Tracker ===== */

:root {
  /* ---- Primary Palette ---- */
  --color-primary: #10B981;
  --color-primary-light: #34D399;
  --color-primary-lighter: #A7F3D0;
  --color-primary-lightest: #D1FAE5;
  --color-primary-dark: #059669;
  --color-primary-darker: #047857;

  /* ---- Accent (Energy Orange) ---- */
  --color-accent: #F97316;
  --color-accent-light: #FB923C;
  --color-accent-lighter: #FDBA74;
  --color-accent-lightest: #FED7AA;
  --color-accent-dark: #EA580C;

  /* ---- Neutral Scale ---- */
  --color-neutral-50: #F9FAFB;
  --color-neutral-100: #F3F4F6;
  --color-neutral-200: #E5E7EB;
  --color-neutral-300: #D1D5DB;
  --color-neutral-400: #9CA3AF;
  --color-neutral-500: #6B7280;
  --color-neutral-600: #4B5563;
  --color-neutral-700: #374151;
  --color-neutral-800: #1F2937;
  --color-neutral-900: #111827;
  --color-neutral-950: #030712;

  /* ---- Surface ---- */
  --color-surface: #FFFFFF;
  --color-surface-secondary: #F9FAFB;
  --color-surface-tertiary: #F3F4F6;
  --color-surface-elevated: #FFFFFF;

  /* ---- State Colors ---- */
  --state-success: #10B981;
  --state-success-bg: #D1FAE5;
  --state-warning: #F59E0B;
  --state-warning-bg: #FEF3C7;
  --state-error: #EF4444;
  --state-error-bg: #FEE2E2;
  --state-info: #3B82F6;
  --state-info-bg: #DBEAFE;

  /* ---- Text ---- */
  --color-text-primary: #111827;
  --color-text-secondary: #4B5563;
  --color-text-tertiary: #9CA3AF;
  --color-text-inverse: #FFFFFF;
  --color-text-link: #10B981;

  /* ---- Typography ---- */
  --font-display: 'Outfit', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
  --font-body: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

  /* Type Scale */
  --text-xs: 0.75rem;     /* 12px */
  --text-sm: 0.875rem;    /* 14px */
  --text-base: 1rem;      /* 16px */
  --text-lg: 1.125rem;    /* 18px */
  --text-xl: 1.25rem;     /* 20px */
  --text-2xl: 1.5rem;     /* 24px */
  --text-3xl: 1.875rem;    /* 30px */
  --text-4xl: 2.25rem;    /* 36px */
  --text-5xl: 3rem;       /* 48px */

  /* Font Weights */
  --font-light: 300;
  --font-regular: 400;
  --font-medium: 500;
  --font-semibold: 600;
  --font-bold: 700;
  --font-extrabold: 800;

  /* Line Heights */
  --leading-tight: 1.25;
  --leading-snug: 1.35;
  --leading-normal: 1.5;
  --leading-relaxed: 1.65;

  /* ---- Spacing ---- */
  --space-1: 0.25rem;   /* 4px */
  --space-2: 0.5rem;     /* 8px */
  --space-3: 0.75rem;    /* 12px */
  --space-4: 1rem;       /* 16px */
  --space-5: 1.25rem;    /* 20px */
  --space-6: 1.5rem;     /* 24px */
  --space-8: 2rem;       /* 32px */
  --space-10: 2.5rem;    /* 40px */
  --space-12: 3rem;      /* 48px */
  --space-16: 4rem;      /* 64px */
  --space-20: 5rem;      /* 80px */

  /* ---- Border Radius ---- */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ---- Shadows ---- */
  --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.03);
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.04);
  --shadow-xl: 0 20px 25px rgba(0, 0, 0, 0.05);

  /* Floating layer shadows (modal, popover, dropdown) */
  --shadow-float: 0 25px 50px rgba(0, 0, 0, 0.08);

  /* ---- Transitions ---- */
  --transition-fast: 150ms ease;
  --transition-base: 250ms ease;
  --transition-slow: 350ms ease;
  --transition-bounce: 400ms cubic-bezier(0.34, 1.56, 0.64, 1);

  /* ---- Z-index ---- */
  --z-dropdown: 100;
  --z-sticky: 200;
  --z-modal-backdrop: 300;
  --z-modal: 400;
  --z-popover: 500;
  --z-toast: 600;
  --z-tooltip: 700;
}

/* ===== Tailwind Integration ===== */
@tailwind base;
@tailwind components;
@tailwind utilities;

    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }

  /* ===== Shell Layout ===== */
  body {
    min-height: 100vh;
    background: var(--color-neutral-50);
    margin: 0;
    padding: 0;
  }

  /* ===== Top Navigation Bar ===== */
  .top-nav {
    position: fixed;
    top: 0;
    left: 240px;
    right: 0;
    height: 64px;
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-neutral-200);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: var(--z-sticky);
    box-shadow: var(--shadow-xs);
  }

  .top-nav__search {
    flex: 1;
    max-width: 480px;
    position: relative;
  }

  .top-nav__search input {
    width: 100%;
    height: 40px;
    padding: 0 16px 0 40px;
    border: 1px solid var(--color-neutral-200);
    border-radius: var(--radius-lg);
    background: var(--color-neutral-50);
    font-family: var(--font-body);
    font-size: var(--text-sm);
    color: var(--color-text-primary);
    transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    outline: none;
  }

  .top-nav__search input::placeholder {
    color: var(--color-text-tertiary);
  }

  .top-nav__search input:focus {
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
  }

  .top-nav__search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--color-text-tertiary);
    pointer-events: none;
  }

  .top-nav__actions {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  .top-nav__notification {
    position: relative;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-lg);
    color: var(--color-neutral-500);
    transition: background var(--transition-fast), color var(--transition-fast);
    cursor: pointer;
    background: none;
    border: none;
  }

  .top-nav__notification:hover {
    background: var(--color-neutral-100);
    color: var(--color-text-primary);
  }

  .top-nav__avatar {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-full);
    background: var(--color-primary);
    color: var(--color-text-inverse);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-body);
    font-size: var(--text-sm);
    font-weight: var(--font-semibold);
    flex-shrink: 0;
    cursor: pointer;
    transition: box-shadow var(--transition-fast);
  }

  .top-nav__avatar:hover {
    box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.25);
  }

  /* ===== Left Sidebar ===== */
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    width: 240px;
    background: var(--color-neutral-800);
    display: flex;
    flex-direction: column;
    z-index: calc(var(--z-sticky) + 1);
    overflow-y: auto;
    overflow-x: hidden;
  }

  .sidebar__logo {
    height: 64px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    flex-shrink: 0;
  }

  .sidebar__logo-icon {
    color: var(--color-primary);
    flex-shrink: 0;
  }

  .sidebar__logo-text {
    font-family: var(--font-display);
    font-size: var(--text-xl);
    font-weight: var(--font-bold);
    color: var(--color-primary-light);
    white-space: nowrap;
    letter-spacing: -0.02em;
  }

  .sidebar__nav {
    flex: 1;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .sidebar__nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    height: 44px;
    padding: 0 12px;
    border-radius: var(--radius-md);
    color: var(--color-neutral-400);
    font-family: var(--font-body);
    font-size: var(--text-sm);
    font-weight: var(--font-medium);
    text-decoration: none;
    white-space: nowrap;
    transition: background var(--transition-fast), color var(--transition-fast);
    position: relative;
    overflow: hidden;
    min-width: 0;
  }

  .sidebar__nav-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 6px;
    bottom: 6px;
    width: 3px;
    border-radius: 0 3px 3px 0;
    background: transparent;
    transition: background var(--transition-fast);
  }

  .sidebar__nav-item:hover {
    background: rgba(255, 255, 255, 0.06);
    color: var(--color-neutral-200);
  }

  .sidebar__nav-item[data-active="true"] {
    background: rgba(16, 185, 129, 0.1);
    color: var(--color-neutral-50);
  }

  .sidebar__nav-item[data-active="true"]::before {
    background: var(--color-primary);
  }

  .sidebar__nav-icon {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
  }

  .sidebar__nav-label {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ===== Main Content Area ===== */
  .main-content {
    margin-left: 240px;
    margin-top: 64px;
    min-height: calc(100vh - 64px);
    padding: 24px;
  }

  /* ===== Responsive ===== */
  @media (max-width: 1023px) {
    .sidebar {
      display: none;
    }

    .top-nav {
      left: 0;
    }

    .main-content {
      margin-left: 0;
    }
  }

  /* ===== Profile Page Styles ===== */
  @layer components {
    /* Profile Banner */
    .profile-banner {
      position: relative;
      border-radius: var(--radius-xl);
      overflow: hidden;
      min-height: 220px;
    }

    .profile-banner__bg {
      position: absolute;
      inset: 0;
      background-image: url('../assets/brand-nutrition.jpg');
      background-size: cover;
      background-position: center;
    }

    .profile-banner__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(17, 24, 39, 0.5) 0%,
        rgba(17, 24, 39, 0.75) 100%
      );
    }

    .profile-banner__content {
      position: relative;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 40px 32px;
      z-index: 1;
    }

    @media (max-width: 640px) {
      .profile-banner__content {
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 32px 20px;
        gap: 12px;
      }
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: var(--radius-full);
      background: var(--color-primary);
      color: var(--color-text-inverse);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: var(--font-bold);
      border: 3px solid rgba(255, 255, 255, 0.3);
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 280ms cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 280ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .profile-avatar:hover {
      transform: scale(1.08);
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.35), 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    @media (prefers-reduced-motion: reduce) {
      .profile-avatar:hover {
        transform: none;
        box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.35);
      }
    }

    .profile-banner__info h1 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: var(--font-bold);
      color: #FFFFFF;
      margin: 0 0 4px 0;
      text-wrap: balance;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .profile-banner__info p {
      font-family: var(--font-body);
      font-size: var(--text-sm);
      color: rgba(255, 255, 255, 0.8);
      margin: 0;
    }

    /* Metric Cards */
    .metric-card {
      background: var(--color-surface);
      border: 1px solid var(--color-neutral-200);
      border-radius: var(--radius-lg);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }

    .metric-card:hover {
      border-color: var(--color-primary-lighter);
      box-shadow: var(--shadow-md);
    }

    .metric-card__edit {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);
      color: var(--color-text-tertiary);
      background: var(--color-neutral-100);
      border: none;
      cursor: pointer;
      opacity: 0;
      transition: opacity var(--transition-fast), color var(--transition-fast), background var(--transition-fast);
    }

    .metric-card:hover .metric-card__edit {
      opacity: 1;
    }

    .metric-card__edit:hover {
      color: var(--color-primary);
      background: var(--color-primary-lightest);
    }

    .metric-card__label {
      font-family: var(--font-body);
      font-size: var(--text-sm);
      color: var(--color-text-tertiary);
      font-weight: var(--font-medium);
    }

    .metric-card__value {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: var(--font-bold);
      color: var(--color-text-primary);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    /* Goal Pill Selector */
    .goal-pills {
      display: inline-flex;
      background: var(--color-neutral-100);
      border-radius: var(--radius-lg);
      padding: 4px;
      gap: 4px;
      position: relative;
    }

    .goal-pill {
      padding: 8px 20px;
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      color: var(--color-text-secondary);
      background: transparent;
      border: none;
      cursor: pointer;
      position: relative;
      z-index: 1;
      transition: color 240ms cubic-bezier(0.3, 0, 0, 1);
      white-space: nowrap;
    }

    .goal-pill:hover {
      color: var(--color-text-primary);
    }

    .goal-pill[data-active="true"] {
      color: var(--color-text-inverse);
    }

    .goal-pills__slider {
      position: absolute;
      top: 4px;
      left: 4px;
      height: calc(100% - 8px);
      background: var(--color-primary);
      border-radius: var(--radius-md);
      transition: transform 320ms cubic-bezier(0.3, 0, 0, 1), width 320ms cubic-bezier(0.3, 0, 0, 1);
      z-index: 0;
      box-shadow: 0 1px 4px rgba(16, 185, 129, 0.3);
    }

    @media (prefers-reduced-motion: reduce) {
      .goal-pills__slider {
        transition: none;
      }
    }

    /* BMI Scale */
    .bmi-scale {
      position: relative;
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(
        to right,
        var(--color-primary-lighter) 0%,
        var(--color-primary) 30%,
        var(--state-warning) 60%,
        var(--state-error) 100%
      );
      margin-top: 8px;
    }

    .bmi-scale__marker {
      position: absolute;
      top: 50%;
      width: 16px;
      height: 16px;
      border-radius: var(--radius-full);
      background: var(--color-surface);
      border: 3px solid var(--color-primary-dark);
      transform: translate(-50%, -50%);
      box-shadow: var(--shadow-md);
      z-index: 1;
    }

    /* Animate BMI marker on load */
    @keyframes bmiSlideIn {
      0% {
        left: 0%;
        opacity: 0;
      }
      100% {
        left: 38%;
        opacity: 1;
      }
    }

    .bmi-scale__marker--animated {
      animation: bmiSlideIn 800ms cubic-bezier(0.32, 0.72, 0, 1) 400ms both;
    }

    @media (prefers-reduced-motion: reduce) {
      .bmi-scale__marker--animated {
        animation: none;
        left: 38%;
        opacity: 1;
      }
    }

    .bmi-scale__labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
    }

    .bmi-scale__labels span {
      font-family: var(--font-body);
      font-size: 11px;
      color: var(--color-text-tertiary);
    }

    /* Activity Level Cards */
    .activity-card {
      padding: 16px;
      border: 2px solid var(--color-neutral-200);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: border-color var(--transition-fast), background var(--transition-fast), box-shadow var(--transition-fast);
      text-align: center;
    }

    .activity-card:hover {
      border-color: var(--color-primary-lighter);
      background: var(--color-primary-lightest);
    }

    .activity-card[data-active="true"] {
      border-color: var(--color-primary);
      background: var(--color-primary-lightest);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
    }

    /* Settings List */
    .settings-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 0;
      border-bottom: 1px solid var(--color-neutral-100);
      cursor: pointer;
      transition: background var(--transition-fast);
    }

    .settings-item:last-child {
      border-bottom: none;
    }

    .settings-item__icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      background: var(--color-neutral-100);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-secondary);
      flex-shrink: 0;
    }

    .settings-item__label {
      flex: 1;
      min-width: 0;
      font-family: var(--font-body);
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      color: var(--color-text-primary);
      truncate;
    }

    .settings-item__chevron {
      color: var(--color-text-tertiary);
      flex-shrink: 0;
    }

    /* Calorie Result Card */
    .calorie-result {
      background: var(--color-primary-lightest);
      border: 1px solid var(--color-primary-lighter);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      display: none;
      align-items: center;
      gap: 12px;
      transition: opacity 320ms cubic-bezier(0.3, 0, 0, 1), max-height 320ms cubic-bezier(0.3, 0, 0, 1);
      overflow: hidden;
    }

    .calorie-result--visible {
      display: flex;
    }

    /* Section Title */
    .section-title {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: var(--font-semibold);
      color: var(--color-text-primary);
      margin: 0 0 16px 0;
      text-wrap: balance;
      word-break: keep-all;
    }

    /* Page Container */
    .profile-page {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
  }

            <i data-lucide="leaf" class="sidebar__logo-icon" style="width:24px;height:24px;"></i>
            <span class="sidebar__logo-text">FitMeal</span>

    <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Goal pill selector with slide animation
    (function() {
        var pillsContainer = document.querySelector('[data-dom-id="goal-pills"]');
        if (!pillsContainer) return;

        var pills = pillsContainer.querySelectorAll('.goal-pill');
        var slider = pillsContainer.querySelector('.goal-pills__slider');
        var activePill = pillsContainer.querySelector('.goal-pill[data-active="true"]');

        function updateSlider(pill) {
            if (!slider || !pill) return;
            var containerRect = pillsContainer.getBoundingClientRect();
            var pillRect = pill.getBoundingClientRect();
            slider.style.width = pillRect.width + 'px';
            slider.style.transform = 'translateX(' + (pillRect.left - containerRect.left - 4) + 'px)';
        }

        // Initialize slider position
        if (activePill) {
            setTimeout(function() { updateSlider(activePill); }, 50);
        }

        // Pill click handler
        pills.forEach(function(pill) {
            pill.addEventListener('click', function() {
                pills.forEach(function(p) {
                    p.removeAttribute('data-active');
                    p.style.color = 'var(--color-text-secondary)';
                });
                pill.setAttribute('data-active', 'true');
                pill.style.color = 'var(--color-text-inverse)';
                updateSlider(pill);
            });
        });

        // Update slider on resize
        window.addEventListener('resize', function() {
            var current = pillsContainer.querySelector('.goal-pill[data-active="true"]');
            if (current) updateSlider(current);
        });
    })();

    // Activity level card selection
    (function() {
        var grid = document.querySelector('[data-dom-id="activity-grid"]');
        if (!grid) return;

        var cards = grid.querySelectorAll('.activity-card');
        var iconColor = 'var(--color-text-tertiary)';
        var iconColorActive = 'var(--color-primary)';
        var textColor = 'var(--color-text-primary)';
        var textColorActive = 'var(--color-primary)';

        cards.forEach(function(card) {
            card.addEventListener('click', function() {
                cards.forEach(function(c) {
                    c.removeAttribute('data-active');
                    var cIcon = c.querySelector('i, svg');
                    if (cIcon) cIcon.style.color = iconColor;
                    var cTitle = c.querySelector('p:first-of-type');
                    if (cTitle) cTitle.style.color = textColor;
                    var cSub = c.querySelector('p:last-of-type');
                    if (cSub) cSub.style.color = iconColor;
                });
                card.setAttribute('data-active', 'true');
                var cardIcon = card.querySelector('i, svg');
                if (cardIcon) cardIcon.style.color = iconColorActive;
                var cardTitle = card.querySelector('p:first-of-type');
                if (cardTitle) cardTitle.style.color = textColorActive;
                var cardSub = card.querySelector('p:last-of-type');
                if (cardSub) cardSub.style.color = iconColorActive;
            });
        });
    })();

    // Calculate daily calorie button
    (function() {
        var btn = document.getElementById('btn-calc-daily');
        var result = document.getElementById('calorie-result');
        if (!btn || !result) return;

        btn.addEventListener('click', function() {
            result.classList.toggle('calorie-result--visible');
        });
    })();
    </script>
